<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>AutomotiveEnthusiast</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Free HTML Templates" name="keywords">
    <meta content="Free HTML Templates" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rubik&display=swap" rel="stylesheet"> 

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.0/css/all.min.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>
 <!-- HEADER -->
    <div id="header-container"></div>

    <!-- Page Header Start -->
    <div class="container-fluid page-header3">
        <h1 class="display-3 text-uppercase text-white mb-3">Contact</h1>
        <div class="d-inline-flex text-white">
            <h6 class="text-uppercase m-0"><a class="text-white" href="">Home</a></h6>
            <h6 class="text-body m-0 px-3">/</h6>
            <h6 class="text-uppercase text-body m-0">Contact</h6>
        </div>
    </div>
    <!-- Page Header Start -->

    <!-- Contact Start -->
<div class="container-fluid py-5" data-aos="fade-up">
    <div class="container pt-5 pb-3">
        <h1 class="display-4 text-uppercase text-center mb-5">
            Get In <span class="text-primary">Touch</span>
        </h1>

        <div class="row">

            <!-- Contact Form -->
            <div class="col-lg-7 mb-2" data-aos="fade-right">
                <div class="contact-form bg-light mb-4 contact-info-box" style="padding: 30px; border-radius: 10px;">
            
                    <form id="contactForm">
            
                        <div class="row">
                            <!-- Name -->
                            <div class="col-6 form-group">
                                <input type="text" name="name" class="form-control p-4" placeholder="Your Name" required>
                            </div>
            
                            <!-- Email -->
                            <div class="col-6 form-group">
                                <input type="email" name="email" class="form-control p-4" placeholder="Your Email" required>
                            </div>
                        </div>
            
                        <div class="row">
                            <!-- Phone -->
                            <div class="col-6 form-group">
                                <input type="tel" name="phone" class="form-control p-4" placeholder="Your Phone Number"
                                    pattern="[0-9]{10}" required>
                            </div>
            
                            <!-- Enquiry Type -->
                            <div class="col-6 form-group">
                                <input list="enquiryOptions" name="enquiry" class="form-control p-4" placeholder="Enquiry Type" required>
                            
                                <datalist id="enquiryOptions">
                                    <option value="Car Inquiry">
                                    <option value="Bike Inquiry">
                                    <option value="Vehicle Review">
                                    <option value="General Question">
                                </datalist>
                            </div>
                        </div>
            
                        <!-- Subject -->
                        <div class="form-group">
                            <input type="text" name="subject" class="form-control p-4" placeholder="Subject" required>
                        </div>
            
                        <!-- Message -->
                        <div class="form-group">
                            <textarea name="message" class="form-control py-3 px-4" rows="3" placeholder="Your Message"
                                required></textarea>
                        </div>
            
                        <!-- Submit -->
                        <div>
                            <button class="btn btn-primary py-3 px-5" type="submit">
                                Send Message
                            </button>
                        </div>
            
                    </form>
                </div>
            </div>

            <!-- Contact Info -->
            <div class="col-lg-5 mb-2" data-aos="fade-left">
                <div class="bg-secondary text-light d-flex flex-column justify-content-center px-5 mb-4 contact-info-box" style="height: 435px; border-radius: 10px;">

                    <h4 class="text-uppercase text-primary mb-4">Contact Details</h4>

                    <!-- Address -->
                    <p class="mb-3">
                        <i class="fa fa-map-marker-alt text-primary mr-3"></i>
                        <a href="https://www.google.com/maps?q=43,+Nakkeran+Street,+K.K.Nagar,+Madurai-625020"
                           target="_blank"
                           style="color:white; ">
                            43, Nakkeran Street, K.K.Nagar, Madurai - 625020
                        </a>
                    </p>

                    <!-- Email -->
                    <p class="mb-4">
                        <i class="fa fa-envelope text-primary mr-3"></i>
                        <a href="mailto:team@mrautomotiventhusiast.com" style="color:white; ">
                            team@mrautomotiventhusiast.com
                        </a>
                    </p>

                    <!-- Extra Info -->
                    <div class="mt-3">
                        <p style="font-size:14px;">
                            Feel free to reach out for vehicle reviews, comparisons, or buying guidance. 
                            We’re here to help you choose the right bike or car with confidence.
                        </p>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
<!-- Contact End -->

<div id="toast" class="toast-msg"></div>
   <!-- Footer Start -->
   <div id="footer-container"></div>
    <!-- Footer End -->

    <!-- Back to Top -->
    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="fa fa-angle-double-up"></i></a>
    
    <!-- AOS Animation JS -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    
    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>
    <script>
function showToast(message, type = "success") {
  const toast = document.getElementById("toast");

  toast.textContent = message;
  toast.className = `toast-msg show ${type}`;

  setTimeout(() => {
    toast.classList.remove("show");
  }, 3000);
}

document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    fetch("https://script.google.com/macros/s/AKfycbwPstiSq0yjUo2BHTeRWJoqA6U7NzBOvPeFWkr-au_QmUlPNWqybDDYeukGBkXocGFG/exec", {
        method: "POST",
        body: formData,
        mode: "no-cors"
    })
    .then(() => {
        showToast("Message sent successfully!", "success");
        document.getElementById("contactForm").reset();
    })
    .catch(() => {
        showToast("Something went wrong!", "error");
    });
});
</script>
    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="lib/tempusdominus/js/moment.min.js"></script>
    <script src="lib/tempusdominus/js/moment-timezone.min.js"></script>
    <script src="lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js"></script>

    <!-- Template Javascript -->
    <script src="js/main.js"></script>
    <script src="js/Script.js"></script>
</body>

</html>
